<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Backrooms - Jigsaw Infinite Exploration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="vignette"></div>
    <div id="glitch-overlay"></div>
    <div id="canvas-container"></div>

    <div id="overlay">
        <h1>THE BACKROOMS</h1>
        <div id="seed-display">SEED: INITIALIZING...</div>
        <p>クリックして侵入する</p>
        <p class="instructions">
            [W, A, S, D] : 移動<br>
            [MOUSE] : 視点移動<br>
            [F] : 懐中電灯 ON/OFF<br>
            [ESC] : 一時停止
        </p>
    </div>

    <!-- すべてのスクリプトはボディの最下部で読み込みます -->
    <!-- 1. Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- 2. コアエンジン (window.Backrooms を初期化する) -->
    <script src="main.js"></script>
    
    <!-- 3. 各レベルの定義スクリプト (初期化されたオブジェクトにレベル情報を登録する) -->
    <script src="level0.js"></script>
    <script src="level1.js"></script>

</body>
</html>
